<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analysis - Flight Price Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark app-navbar">
        <div class="container">
            <a class="navbar-brand text-white" href="/">
                <span class="brand-icon"><i class="bi bi-airplane-fill"></i></span>
                Flight Price Tracker
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" data-page="dashboard" href="/"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" data-page="flights" href="/flights"><i class="bi bi-list-ul"></i> Flights</a></li>
                    <li class="nav-item"><a class="nav-link" data-page="analysis" href="/analysis"><i class="bi bi-graph-up-arrow"></i> Analysis</a></li>
                    <li class="nav-item"><a class="nav-link" data-page="statistics" href="/statistics"><i class="bi bi-bar-chart-line"></i> Statistics</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <div id="toast-container" class="position-fixed top-0 end-0 p-3" style="z-index: 9999;"></div>

        <div class="page-hero">
            <span class="hero-badge mb-2 d-inline-block"><i class="bi bi-graph-up me-1"></i>AnalysisEngine · Chart.js</span>
            <h1>價格分析</h1>
            <p>查看航班價格趨勢、歷史紀錄與智慧警報</p>
        </div>

        <div class="card content-card">
            <div class="card-header">
                <h5><i class="bi bi-binoculars header-icon"></i> 選擇分析目標</h5>
            </div>
            <div class="card-body">
                <div class="row mb-4">
                    <div class="col-lg-6">
                        <label class="form-label fw-semibold text-muted small">航班</label>
                        <select class="form-select form-select-lg" id="flight-select">
                            <option value="">— 請選擇航班 —</option>
                        </select>
                    </div>
                </div>

                <div id="analysis-result">
                    <div class="empty-state">
                        <i class="bi bi-graph-up-arrow"></i>
                        <p class="mb-0">請選擇航班以查看價格分析與趨勢圖</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="app-footer">
        <div class="container"><strong>Flight Price Tracker</strong> · C++17 期末專題 · &copy; 2026</div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/analysis.js"></script>
</body>
</html>
