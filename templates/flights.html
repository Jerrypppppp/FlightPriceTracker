<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flights - Flight Price Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark app-navbar">
        <div class="container">
            <a class="navbar-brand text-white" href="/">
                <span class="brand-icon"><i class="bi bi-airplane-fill"></i></span>
                Flight Price Tracker
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" data-page="dashboard" href="/"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" data-page="flights" href="/flights"><i class="bi bi-list-ul"></i> Flights</a></li>
                    <li class="nav-item"><a class="nav-link" data-page="analysis" href="/analysis"><i class="bi bi-graph-up-arrow"></i> Analysis</a></li>
                    <li class="nav-item"><a class="nav-link" data-page="statistics" href="/statistics"><i class="bi bi-bar-chart-line"></i> Statistics</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <div id="toast-container" class="position-fixed top-0 end-0 p-3" style="z-index: 9999;"></div>

        <div class="page-hero d-flex flex-wrap justify-content-between align-items-center gap-3">
            <div>
                <span class="hero-badge mb-2 d-inline-block"><i class="bi bi-database me-1"></i>SQLite CRUD</span>
                <h1>航班管理</h1>
                <p>新增、編輯、刪除、搜尋與排序航班資料</p>
            </div>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addModal">
                <i class="bi bi-plus-lg me-1"></i>新增航班
            </button>
        </div>

        <div class="card content-card">
            <div class="card-header">
                <h5><i class="bi bi-funnel header-icon"></i> 搜尋與篩選</h5>
            </div>
            <div class="card-body">
                <div class="search-toolbar mb-4">
                    <div class="row g-3 align-items-end">
                        <div class="col-md-7">
                            <label class="form-label small fw-semibold text-muted">關鍵字搜尋</label>
                            <div class="input-group">
                                <span class="input-group-text bg-white border-end-0"><i class="bi bi-search text-muted"></i></span>
                                <input type="text" class="form-control border-start-0" id="search-input"
                                       placeholder="航班編號、出發地或目的地（例如 TPE）">
                                <button class="btn btn-primary px-4" id="search-btn">搜尋</button>
                            </div>
                        </div>
                        <div class="col-md-5">
                            <label class="form-label small fw-semibold text-muted">排序方式</label>
                            <select class="form-select" id="sort-select">
                                <option value="">預設排序</option>
                                <option value="price_asc">價格：低到高</option>
                                <option value="price_desc">價格：高到低</option>
                                <option value="date_asc">日期：最近出發</option>
                                <option value="date_desc">日期：最晚出發</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="table-responsive">
                    <table class="table pro-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>航班</th>
                                <th>路線</th>
                                <th>出發日期</th>
                                <th>價格</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="flights-body">
                            <tr><td colspan="6" class="text-center text-muted py-4 loading-pulse">載入中...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="addModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <form id="add-form">
                    <div class="modal-header">
                        <h5 class="modal-title"><i class="bi bi-plus-circle me-2 text-primary"></i>新增航班</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <div class="row g-3">
                            <div class="col-6">
                                <label class="form-label fw-semibold">航班編號</label>
                                <input type="text" class="form-control" id="add-number" required placeholder="CI100">
                            </div>
                            <div class="col-6">
                                <label class="form-label fw-semibold">價格 (NT$)</label>
                                <input type="number" class="form-control" id="add-price" required min="0" step="100" placeholder="8500">
                            </div>
                            <div class="col-6">
                                <label class="form-label fw-semibold">出發地</label>
                                <input type="text" class="form-control" id="add-origin" required placeholder="TPE">
                            </div>
                            <div class="col-6">
                                <label class="form-label fw-semibold">目的地</label>
                                <input type="text" class="form-control" id="add-destination" required placeholder="NRT">
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-semibold">出發日期</label>
                                <input type="date" class="form-control" id="add-date" required>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-light" data-bs-dismiss="modal">取消</button>
                        <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-1"></i>新增</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="modal fade" id="editModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <form id="edit-form">
                    <input type="hidden" id="edit-id">
                    <div class="modal-header">
                        <h5 class="modal-title"><i class="bi bi-pencil-square me-2 text-primary"></i>編輯航班</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">航班編號</label>
                            <input type="text" class="form-control bg-light" id="edit-number" disabled>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">路線</label>
                            <input type="text" class="form-control bg-light" id="edit-route" disabled>
                        </div>
                        <div class="row g-3">
                            <div class="col-6">
                                <label class="form-label fw-semibold">出發日期</label>
                                <input type="date" class="form-control" id="edit-date" required>
                            </div>
                            <div class="col-6">
                                <label class="form-label fw-semibold">價格 (NT$)</label>
                                <input type="number" class="form-control" id="edit-price" required min="0" step="100">
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-light" data-bs-dismiss="modal">取消</button>
                        <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-1"></i>儲存</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <footer class="app-footer">
        <div class="container"><strong>Flight Price Tracker</strong> · C++17 期末專題 · &copy; 2026</div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/flights.js"></script>
</body>
</html>
