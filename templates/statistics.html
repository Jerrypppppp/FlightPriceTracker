<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statistics - Flight Price Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark app-navbar">
        <div class="container">
            <a class="navbar-brand text-white" href="/">
                <span class="brand-icon"><i class="bi bi-airplane-fill"></i></span>
                Flight Price Tracker
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" data-page="dashboard" href="/"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" data-page="flights" href="/flights"><i class="bi bi-list-ul"></i> Flights</a></li>
                    <li class="nav-item"><a class="nav-link" data-page="analysis" href="/analysis"><i class="bi bi-graph-up-arrow"></i> Analysis</a></li>
                    <li class="nav-item"><a class="nav-link" data-page="statistics" href="/statistics"><i class="bi bi-bar-chart-line"></i> Statistics</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <div id="toast-container" class="position-fixed top-0 end-0 p-3" style="z-index: 9999;"></div>

        <div class="page-hero">
            <span class="hero-badge mb-2 d-inline-block"><i class="bi bi-bar-chart me-1"></i>STL 統計演算法</span>
            <h1>系統統計</h1>
            <p>完整航班價格統計與警報分析報告</p>
        </div>

        <div class="row g-3 mb-4">
            <div class="col-xl-4 col-md-6">
                <div class="card stat-card"><div class="card-body">
                    <div class="stat-icon-wrap blue"><i class="bi bi-airplane"></i></div>
                    <div class="stat-content"><div class="stat-label">航班總數</div><div class="stat-value" id="stat-total">—</div></div>
                </div></div>
            </div>
            <div class="col-xl-4 col-md-6">
                <div class="card stat-card"><div class="card-body">
                    <div class="stat-icon-wrap cyan"><i class="bi bi-calculator"></i></div>
                    <div class="stat-content"><div class="stat-label">平均價格</div><div class="stat-value" id="stat-avg">—</div></div>
                </div></div>
            </div>
            <div class="col-xl-4 col-md-6">
                <div class="card stat-card"><div class="card-body">
                    <div class="stat-icon-wrap green"><i class="bi bi-arrow-down"></i></div>
                    <div class="stat-content"><div class="stat-label">最低價格</div><div class="stat-value price-low" id="stat-min">—</div></div>
                </div></div>
            </div>
            <div class="col-xl-4 col-md-6">
                <div class="card stat-card"><div class="card-body">
                    <div class="stat-icon-wrap red"><i class="bi bi-arrow-up"></i></div>
                    <div class="stat-content"><div class="stat-label">最高價格</div><div class="stat-value price-high" id="stat-max">—</div></div>
                </div></div>
            </div>
            <div class="col-xl-4 col-md-6">
                <div class="card stat-card"><div class="card-body">
                    <div class="stat-icon-wrap orange"><i class="bi bi-tag"></i></div>
                    <div class="stat-content"><div class="stat-label">優惠航班</div><div class="stat-value" id="stat-discount">—</div></div>
                </div></div>
            </div>
            <div class="col-xl-4 col-md-6">
                <div class="card stat-card"><div class="card-body">
                    <div class="stat-icon-wrap purple"><i class="bi bi-graph-down"></i></div>
                    <div class="stat-content"><div class="stat-label">歷史新低</div><div class="stat-value" id="stat-historical-low">—</div></div>
                </div></div>
            </div>
            <div class="col-xl-4 col-md-6">
                <div class="card stat-card"><div class="card-body">
                    <div class="stat-icon-wrap red"><i class="bi bi-lightning"></i></div>
                    <div class="stat-content"><div class="stat-label">連續下跌</div><div class="stat-value" id="stat-consecutive-drop">—</div></div>
                </div></div>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-12">
                <div class="card content-card">
                    <div class="card-header">
                        <h5><i class="bi bi-cpu header-icon"></i> 智慧警報列表</h5>
                        <span class="text-muted small">AnalysisEngine 規則引擎</span>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table pro-table mb-0">
                                <thead><tr><th>航班</th><th>路線</th><th>目前價格</th><th>警報類型</th></tr></thead>
                                <tbody id="advanced-body">
                                    <tr><td colspan="4" class="text-center text-muted py-4 loading-pulse">載入中...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-lg-6">
                <div class="card content-card">
                    <div class="card-header"><h5><i class="bi bi-tag-fill header-icon"></i> 優惠航班</h5></div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table pro-table mb-0">
                                <thead><tr><th>航班</th><th>路線</th><th>價格</th><th>優惠</th><th>狀態</th></tr></thead>
                                <tbody id="discount-body">
                                    <tr><td colspan="5" class="text-center text-muted py-4 loading-pulse">載入中...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-lg-6">
                <div class="card content-card">
                    <div class="card-header"><h5><i class="bi bi-list-ol header-icon"></i> 價格排行</h5></div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table pro-table mb-0">
                                <thead><tr><th>#</th><th>航班</th><th>路線</th><th>日期</th><th>價格</th></tr></thead>
                                <tbody id="all-ranking-body">
                                    <tr><td colspan="5" class="text-center text-muted py-4 loading-pulse">載入中...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="app-footer">
        <div class="container"><strong>Flight Price Tracker</strong> · C++17 期末專題 · &copy; 2026</div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/statistics.js"></script>
</body>
</html>
