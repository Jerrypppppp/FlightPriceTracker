<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Flight Price Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark app-navbar">
        <div class="container">
            <a class="navbar-brand text-white" href="/">
                <span class="brand-icon"><i class="bi bi-airplane-fill"></i></span>
                Flight Price Tracker
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" data-page="dashboard" href="/"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" data-page="flights" href="/flights"><i class="bi bi-list-ul"></i> Flights</a></li>
                    <li class="nav-item"><a class="nav-link" data-page="analysis" href="/analysis"><i class="bi bi-graph-up-arrow"></i> Analysis</a></li>
                    <li class="nav-item"><a class="nav-link" data-page="statistics" href="/statistics"><i class="bi bi-bar-chart-line"></i> Statistics</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <div id="toast-container" class="position-fixed top-0 end-0 p-3" style="z-index: 9999;"></div>

        <div class="page-hero d-flex flex-wrap justify-content-between align-items-center gap-3">
            <div>
                <span class="hero-badge mb-2 d-inline-block"><i class="bi bi-cpu me-1"></i>C++17 · SQLite · REST API</span>
                <h1>Dashboard</h1>
                <p>航班價格追蹤總覽與即時優惠監控</p>
            </div>
            <div class="text-end d-none d-md-block">
                <div class="text-muted small">系統狀態</div>
                <div class="fw-bold text-success"><i class="bi bi-circle-fill me-1" style="font-size:0.5rem"></i>運行中</div>
            </div>
        </div>

        <div class="row g-3 mb-3">
            <div class="col-xl-3 col-md-6">
                <div class="card stat-card">
                    <div class="card-body">
                        <div class="stat-icon-wrap blue"><i class="bi bi-airplane"></i></div>
                        <div class="stat-content">
                            <div class="stat-label">航班總數</div>
                            <div class="stat-value" id="total-flights">—</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-xl-3 col-md-6">
                <div class="card stat-card">
                    <div class="card-body">
                        <div class="stat-icon-wrap cyan"><i class="bi bi-currency-dollar"></i></div>
                        <div class="stat-content">
                            <div class="stat-label">平均價格</div>
                            <div class="stat-value" id="avg-price">—</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-xl-3 col-md-6">
                <div class="card stat-card">
                    <div class="card-body">
                        <div class="stat-icon-wrap green"><i class="bi bi-arrow-down-circle"></i></div>
                        <div class="stat-content">
                            <div class="stat-label">最低價格</div>
                            <div class="stat-value price-low" id="min-price">—</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-xl-3 col-md-6">
                <div class="card stat-card">
                    <div class="card-body">
                        <div class="stat-icon-wrap orange"><i class="bi bi-trophy"></i></div>
                        <div class="stat-content">
                            <div class="stat-label">最低價航班</div>
                            <div class="stat-value sm" id="cheapest-flight">—</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row g-3 mb-4">
            <div class="col-md-4">
                <div class="card stat-card">
                    <div class="card-body">
                        <div class="stat-icon-wrap purple"><i class="bi bi-graph-down-arrow"></i></div>
                        <div class="stat-content">
                            <div class="stat-label">歷史新低</div>
                            <div class="stat-value" id="historical-low-count">—</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card stat-card">
                    <div class="card-body">
                        <div class="stat-icon-wrap red"><i class="bi bi-lightning-charge"></i></div>
                        <div class="stat-content">
                            <div class="stat-label">連續下跌</div>
                            <div class="stat-value" id="consecutive-drop-count">—</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card stat-card">
                    <div class="card-body">
                        <div class="stat-icon-wrap red"><i class="bi bi-tag-fill"></i></div>
                        <div class="stat-content">
                            <div class="stat-label">特價航班</div>
                            <div class="stat-value" id="discount-count">—</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-lg-5">
                <div class="card content-card mb-4">
                    <div class="card-header">
                        <h5><i class="bi bi-bell-fill header-icon"></i> 最新優惠通知</h5>
                        <span class="header-badge bg-danger text-white" id="discount-badge">0</span>
                    </div>
                    <div class="card-body" id="discount-alerts">
                        <p class="text-muted loading-pulse mb-0">載入中...</p>
                    </div>
                </div>
                <div class="card content-card">
                    <div class="card-header">
                        <h5><i class="bi bi-cpu header-icon"></i> 智慧警報引擎</h5>
                    </div>
                    <div class="card-body" id="advanced-alerts">
                        <p class="text-muted loading-pulse mb-0">載入中...</p>
                    </div>
                </div>
            </div>
            <div class="col-lg-7">
                <div class="card content-card">
                    <div class="card-header">
                        <h5><i class="bi bi-sort-numeric-down header-icon"></i> 優惠排行榜</h5>
                        <span class="text-muted small">價格由低到高</span>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table pro-table mb-0">
                                <thead>
                                    <tr>
                                        <th>#</th>
                                        <th>航班</th>
                                        <th>路線</th>
                                        <th>日期</th>
                                        <th>價格</th>
                                    </tr>
                                </thead>
                                <tbody id="ranking-body">
                                    <tr><td colspan="5" class="text-center text-muted py-4 loading-pulse">載入中...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="app-footer">
        <div class="container">
            <strong>Flight Price Tracker</strong> · C++17 期末專題 · &copy; 2026
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/dashboard.js"></script>
</body>
</html>
